<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="58" fill="#007ACC" stroke="#005A9B" stroke-width="2"/>
  
  <!-- X-Ray scanning lines -->
  <g stroke="#FFD700" stroke-width="2" opacity="0.8">
    <line x1="20" y1="30" x2="108" y2="30"/>
    <line x1="20" y1="50" x2="108" y2="50"/>
    <line x1="20" y1="70" x2="108" y2="70"/>
    <line x1="20" y1="90" x2="108" y2="90"/>
  </g>
  
  <!-- Team members (circles) -->
  <g fill="#FFFFFF">
    <circle cx="40" cy="40" r="8"/>
    <circle cx="64" cy="35" r="8"/>
    <circle cx="88" cy="42" r="8"/>
    <circle cx="45" cy="65" r="8"/>
    <circle cx="75" cy="70" r="8"/>
    <circle cx="55" cy="90" r="8"/>
  </g>
  
  <!-- Connection lines between team members -->
  <g stroke="#FFFFFF" stroke-width="1.5" opacity="0.6">
    <line x1="40" y1="40" x2="64" y2="35"/>
    <line x1="64" y1="35" x2="88" y2="42"/>
    <line x1="40" y1="40" x2="45" y2="65"/>
    <line x1="45" y1="65" x2="55" y2="90"/>
    <line x1="75" y1="70" x2="88" y2="42"/>
    <line x1="75" y1="70" x2="55" y2="90"/>
  </g>
  
  <!-- X-Ray lens/magnifying glass -->
  <g stroke="#FFD700" stroke-width="3" fill="none">
    <circle cx="85" cy="85" r="12"/>
    <line x1="95" y1="95" x2="105" y2="105" stroke-linecap="round"/>
  </g>
  
  <!-- Center highlight dot -->
  <circle cx="64" cy="64" r="3" fill="#FFD700"/>
</svg>
